<div class="header">
    <div class="header-inner">
        <div class="menu">
            <div class="language-switch desktop-only">
                <div class="lang-option" [class.active]="currentLang === 'en'" (click)="setLanguage('en')">EN</div>
                <div class="lang-option" [class.active]="currentLang === 'de'" (click)="setLanguage('de')">DE</div>
            </div>
            <div class="nav-links desktop-only">
                <a class="hover-underline" href="#about">{{ translation.translate('HEADER.ABOUTME') }}</a>
                <a class="hover-underline" href="#skill">{{ translation.translate('HEADER.SKILLS') }}</a>
                <a class="hover-underline" href="#projects">{{ translation.translate('HEADER.PROJECTS') }}</a>
            </div>
            <button class="mobile-menu-button mobile-only" aria-label="Open menu" (click)="toggleMobileMenu()">
                <img src="assets/img/icons/menu icon.png" alt="menu" />
            </button>
        </div>
        <button class="logo" type="button" aria-label="Go to homepage" (click)="goHome()">
            <img src="assets/img/TW logo.png" alt="TW Logo">
        </button>
    </div>
    <div class="mobile-menu-backdrop" [class.open]="mobileMenuOpen" (click)="closeMobileMenu()"></div>
    <div class="mobile-menu mobile-only" [class.open]="mobileMenuOpen">
        <div class="mobile-menu-inner">
            <nav class="mobile-nav">
                <a class="hover-underline" href="#about" (click)="closeMobileMenu()">{{ translation.translate('HEADER.ABOUTME') }}</a>
                <a class="hover-underline" href="#skill" (click)="closeMobileMenu()">{{ translation.translate('HEADER.SKILLS') }}</a>
                <a class="hover-underline" href="#projects" (click)="closeMobileMenu()">{{ translation.translate('HEADER.PROJECTS') }}</a>
            </nav>
            <div class="language-switch">
                <div class="lang-option" [class.active]="currentLang === 'en'" (click)="setLanguage('en')">EN</div>
                <div class="lang-option" [class.active]="currentLang === 'de'" (click)="setLanguage('de')">DE</div>
            </div>
        </div>
    </div>
</div>
